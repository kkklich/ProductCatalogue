name: Build and Deploy Angular App to Cyberfolks

on:
  push:
    branches:
      - main 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: product-app-frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci 

    - name: Build Angular Project
      run: npm run build -- --configuration production --base-href /products/

    - name: Deploy to Cyberfolks via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}

        protocol: ftps
        
        dangerous-clean-slate: false
        
        local-dir: ./product-app-frontend/dist/product-app/browser/ 
        server-dir: /sites/krzysztofklich.pl/public_html/products/
        