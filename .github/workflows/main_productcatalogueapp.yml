name: Build and deploy ASP.Net Core app to Azure Web App - ProductCatalogueApp

on:
  push:
    branches:
      - azure
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore Product-backend/Product-API/Product-API.csproj

      - name: Build with dotnet
        run: dotnet build Product-backend/Product-API/Product-API.csproj --configuration Release --no-restore

      # --- ADDED TEST STEP ---
      - name: Run xUnit Tests
        run: dotnet test Product-backend/Products.Tests --configuration Release --no-build --verbosity normal

      - name: dotnet publish
        run: dotnet publish Product-backend/Product-API/Product-API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0251E6943AFB4733837D246E85D1A8B2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F4F6F4B1F744652A9F6181891CB1323 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_29111816EE2C4EBBB47FDB43ECEBA2D1 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ProductCatalogueApp'
          slot-name: 'Production'
          package: .