<div class="dashboard-container">

    <div class="dashboard-header">
        <mat-form-field appearance="outline" class="search-field" color="primary">
            <mat-label>Search products</mat-label>
            <mat-icon matPrefix>search</mat-icon>
            <input matInput [(ngModel)]="searchQuery" (ngModelChange)="onSearchInput($event)"
                (keyup.enter)="onEnterSearch()" placeholder="Type code or name...">
        </mat-form-field>

        <button mat-flat-button color="primary" class="add-button" (click)="openProductDialog()">
            <mat-icon>add</mat-icon> Add Product
        </button>
    </div>

    <div class="table-card mat-elevation-z4">

        <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>

        <div class="table-wrapper">
            <table mat-table [dataSource]="dataSource" class="product-table" matSort
                (matSortChange)="onSortChange($event)">

                <ng-container matColumnDef="code">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Code </th>
                    <td mat-cell *matCellDef="let product"> <strong>{{product.code}}</strong> </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                    <td mat-cell *matCellDef="let product"> {{product.name}} </td>
                </ng-container>

                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Price </th>
                    <td mat-cell *matCellDef="let product" class="price-cell"> {{product.price | currency:'PLN'}} </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="actions-header"> Actions </th>
                    <td mat-cell *matCellDef="let product" class="actions-cell">
                        <button mat-icon-button class="action-btn edit-btn" (click)="openProductDialog(product)"
                            matTooltip="Edit">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button class="action-btn delete-btn" (click)="deleteProduct(product.id)"
                            matTooltip="Delete">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="product-row"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell empty-state" colspan="4" *ngIf="!isLoading">
                        <mat-icon class="empty-icon">inventory_2</mat-icon>
                        <p>No products found.</p>
                    </td>
                </tr>
            </table>
        </div>

        <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 20]" (page)="onPageChange($event)" showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
